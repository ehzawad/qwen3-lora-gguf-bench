name: CPU tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install lightweight test dependency
        run: python -m pip install 'requests>=2.31,<3'
      - name: Run regression tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python -m compileall -q scripts tests
      - name: Check shell syntax
        run: >-
          bash -n run.sh scripts/sweep_concurrency.sh
          scripts/engine_fair.sh scripts/engine_compare.sh
          scripts/model_serve_bench.sh
